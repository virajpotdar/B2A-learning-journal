services:
  - type: web
    name: b2a-backend-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npx tsx src/server.ts
    envVars:
      # These tell Render to expect your Supabase keys, 
      # but keeps the actual passwords hidden (sync: false)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false