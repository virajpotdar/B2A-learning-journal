name: Deploy to QA

on:
  push:
    branches: [ qa ]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: qa
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install latest Vercel CLI
      run: npm install -g vercel@latest

    - name: Deploy Frontend to Vercel (QA)
      run: |
        cd frontend
        vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes

  deploy-backend:
    runs-on: ubuntu-latest
    environment: qa

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy Backend to Render (QA)
      uses: johnbeynon/render-deploy-action@v0.0.8
      with:
        service-id: ${{ secrets.RENDER_QA_SERVICE_ID }}
        api-key: ${{ secrets.RENDER_API_KEY }}
