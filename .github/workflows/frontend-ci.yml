name: Frontend CI

on:
  push:
    branches: [ main, develop, qa ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main, develop, qa ]
    paths:
      - 'frontend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run type check
      run: npm run type-check || npx tsc --noEmit || echo "Type check skipped"

    - name: Run lint
      run: npm run lint || echo "Linting skipped"

    - name: Run unit tests
      run: npm run test:run || echo "Tests skipped"

    - name: Build
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist
        retention-days: 7
